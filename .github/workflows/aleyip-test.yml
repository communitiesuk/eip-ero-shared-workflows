name: AleYip Test

on:
  push:

jobs:
  check-bank-holiday:
    runs-on: ubuntu-latest
    outputs:
      is_bank_holiday: ${{ steps.check.outputs.is_bank_holiday }}
    steps:
      - name: Check if today is a bank holiday
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "today:"
          echo $TODAY
          
          IS_HOLIDAY=$(
            curl -s https://www.gov.uk/bank-holidays.json |
            jq --arg today "$TODAY" \
              '[.["england-and-wales"].events[] | select(.date == $today)] | length > 0'
          )

          echo "is_holiday:"
          echo $IS_HOLIDAY
          
          echo "is_bank_holiday=$IS_HOLIDAY" >> "$GITHUB_OUTPUT"

  job2:
    runs-on: ubuntu-latest
    needs: check-bank-holiday
    steps:
      - env:
          OUTPUT1: ${{needs.check-bank-holiday.outputs.is_bank_holiday}}
        run: echo "$OUTPUT1"
