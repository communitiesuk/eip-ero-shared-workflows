name: OWASP Dependency Check

on:
  workflow_call:
    secrets:
      slack_vulnerability_alerts_webhook:
        required: true
        description: Webhook URL for Slack notifications about vulnerabilities
      vulnerability_alerts_nvd_api_key:
        required: true
        description: NVD API key for the OWASP Dependency Check
      vulnerability_alerts_oss_index_username:
        required: true
        description: Username for OSS Index
      vulnerability_alerts_oss_index_password:
        required: true
        description: Password for OSS Index

jobs:
  owasp-dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
      # Installing JDK needs to come after checking out the repo because the action (setup-java) looks for the gradle wrapper files
      - name: Install JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17
          cache: gradle
      - name: Run gradle OWASP Dependency Analyzer
        id: dependency_check
        run: |
          set +e
          ./gradlew clean dependencyCheckAnalyze \
            -Dnvd.api.key=${{ secrets.vulnerability_alerts_nvd_api_key }} \
            -Danalyzer.ossindex.user=${{ secrets.vulnerability_alerts_oss_index_username }} \
            -Danalyzer.ossindex.password=${{ secrets.vulnerability_alerts_oss_index_password }} \
            --no-daemon 2>error.log
          GRADLE_EXIT_CODE="$?"
          echo "gradle_exit_code=${GRADLE_EXIT_CODE}" >> $GITHUB_ENV
          exit $GRADLE_EXIT_CODE
        continue-on-error: true
        timeout-minutes: 30
      - name: Analyze results and classify issue type
        id: classify
        if: always()
        run: |
          GRADLE_EXIT=${{ env.gradle_exit_code }}
          
          if [ "$GRADLE_EXIT" = "0" ]; then
            echo "issue_type=none" >> $GITHUB_ENV
            echo "should_fail=false" >> $GITHUB_ENV
          else
            # Extract CVEs from error log
            CVE_LIST=$(grep 'One or more dependencies' error.log | sed  's/^.*: /* /' | sed  's/,/\\n*/g')
          
            if [ -n "$CVE_LIST" ]; then
              echo "issue_type=vulnerabilities" >> $GITHUB_ENV
              echo "should_fail=true" >> $GITHUB_ENV
              echo "CVE_LIST=$CVE_LIST" >> $GITHUB_ENV
            else
              echo "issue_type=unexpected_error" >> $GITHUB_ENV
              echo "should_fail=true" >> $GITHUB_ENV
              echo "CVE_LIST=" >> $GITHUB_ENV
            fi
          fi
      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Dependency Analysis Logs
          path: |
            build/reports/dependency-check-report.html
      - name: Send slack notification
        if: always()
        run: |
          # Get the project name from the repository - everything after the final slash - eg: "communitiesuk/eip-ero-portal" -> "eip-ero-portal"
          PROJECT_NAME=$(echo "${{ github.repository }}" | grep -Eo "([^/]+$)")
          # Construct the URL of this run to include in the slack message
          GITHUB_ACTION_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          if [ "${{ env.issue_type }}" = "none" ]; then
            # Success notification
            cat <<EOF >>slack-notification.json
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "text": "OWASP Dependency Check completed successfully",
                    "type": "plain_text"
                  }
                },
                {
                  "type": "section",
                  "fields": [ 
                    {
                      "text": "*Project:*\n${PROJECT_NAME}",
                      "type": "mrkdwn"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "text": "*Result:*\nNo vulnerabilities detected",
                      "type": "mrkdwn"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "text": "<${GITHUB_ACTION_RUN_URL}|View job details>",
                      "type": "mrkdwn"
                    }
                  ]
                }
              ]
            }
          EOF
          elif [ "${{ env.issue_type }}" = "vulnerabilities" ]; then
            # Vulnerability notification
            cat <<EOF >>slack-notification.json
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "text": "OWASP Dependency Analyzer identified potential vulnerabilities",
                    "type": "plain_text"
                  }
                },
                {
                  "type": "section",
                  "fields": [ 
                    {
                      "text": "*Project:*\n${PROJECT_NAME}",
                      "type": "mrkdwn"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "text": "*Potential CVEs:*\n${{ env.CVE_LIST }}",
                      "type": "mrkdwn"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "text": "<${GITHUB_ACTION_RUN_URL}|View job and investigate>",
                      "type": "mrkdwn"
                    }
                  ]
                }
              ]
            }
          EOF
          else
            # Unexpected error notification
            cat <<EOF >>slack-notification.json
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "text": "OWASP Dependency Analyzer encountered an unexpected error",
                    "type": "plain_text"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "text": "*Project:*\n${PROJECT_NAME}",
                      "type": "mrkdwn"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "text": "*Error Type:*\nUnexpected error or timeout during dependency analysis",
                      "type": "mrkdwn"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "text": "<${GITHUB_ACTION_RUN_URL}|View job and investigate>",
                      "type": "mrkdwn"
                    }
                  ]
                }
              ]
            }
          EOF
          fi
          
          curl -X POST \
               -H 'Content-type: application/json' \
               --data '@slack-notification.json' \
               ${{ secrets.slack_vulnerability_alerts_webhook }}
      - name: Fail job on issues
        if: always() && env.should_fail == 'true'
        run: exit 1
